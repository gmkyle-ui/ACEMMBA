<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星座MBA选修课 | 快PICK属于你的上升课程</title>
<style>
  /* ====== 全局样式 ====== */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --dark-gold: #9A7A2B;
    --deep: #0D0B2A;
    --card-bg: #1A1745;
    --star-glow: rgba(201, 168, 76, 0.6);
  }

  body {
    background: var(--deep);
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ====== 星空背景 ====== */
  #stars-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ====== 顶部Banner ====== */
  .hero {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 48px 20px 30px;
    background: linear-gradient(180deg, rgba(13,11,42,0) 0%, rgba(13,11,42,0.5) 100%);
  }

  .hero-badge {
    display: inline-block;
    background: linear-gradient(135deg, #C9A84C, #FDEEA8, #C9A84C);
    color: #1A1745;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 5px 16px;
    border-radius: 30px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .hero h1 {
    font-size: clamp(24px, 6vw, 38px);
    font-weight: 900;
    line-height: 1.3;
    background: linear-gradient(135deg, #FDEEA8 0%, #C9A84C 50%, #FDEEA8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .hero-subtitle {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    line-height: 1.8;
    max-width: 340px;
    margin: 0 auto 8px;
  }

  .hero-tip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    color: var(--gold);
    margin-top: 18px;
    animation: pulse 2s infinite;
  }

  .hero-tip::before, .hero-tip::after {
    content: "✦";
    font-size: 10px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ====== 星座网格 ====== */
  .zodiac-grid {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    padding: 0 16px 30px;
    max-width: 500px;
    margin: 0 auto;
  }

  /* ====== 星座卡片 ====== */
  .card-wrapper {
    position: relative;
    aspect-ratio: 1;
    cursor: pointer;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    transition: transform 0.2s ease;
  }

  .card-wrapper:active {
    transform: scale(0.96);
  }

  /* 底层内容（刮开后显示） */
  .card-reveal {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: linear-gradient(135deg, #1A1745 0%, #2A2060 100%);
    border: 1px solid rgba(201, 168, 76, 0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 8px;
    text-align: center;
  }

  .reveal-symbol {
    font-size: 32px;
    margin-bottom: 4px;
    filter: drop-shadow(0 0 8px var(--star-glow));
  }

  .reveal-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .reveal-courses {
    font-size: 10px;
    line-height: 1.5;
    color: rgba(255,255,255,0.85);
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .reveal-courses strong {
    color: #FDEEA8;
    font-size: 10px;
  }

  /* Canvas 刮刮乐层 */
  .scratch-canvas {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    cursor: crosshair;
    touch-action: none;
  }

  /* 刮开完成后的光芒效果 */
  .card-wrapper.revealed .card-reveal {
    animation: reveal-shine 0.6s ease forwards;
  }

  @keyframes reveal-shine {
    0% { box-shadow: inset 0 0 0 rgba(201,168,76,0); }
    50% { box-shadow: inset 0 0 40px rgba(201,168,76,0.4); }
    100% { box-shadow: inset 0 0 10px rgba(201,168,76,0.15); }
  }

  /* ====== 进度提示 ====== */
  .progress-bar-wrap {
    position: relative;
    z-index: 2;
    padding: 0 20px 12px;
    max-width: 500px;
    margin: 0 auto;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #C9A84C, #FDEEA8);
    border-radius: 10px;
    width: 0%;
    transition: width 0.4s ease;
  }

  /* ====== 详情弹窗 ====== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-sheet {
    background: linear-gradient(160deg, #1A1745 0%, #0D0B2A 100%);
    border-top-left-radius: 28px;
    border-top-right-radius: 28px;
    border: 1px solid rgba(201,168,76,0.2);
    border-bottom: none;
    padding: 24px 24px 40px;
    width: 100%;
    max-width: 500px;
    max-height: 88vh;
    overflow-y: auto;
    animation: slide-up 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  }

  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    margin: 0 auto 20px;
  }

  .modal-zodiac-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .modal-symbol-big {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #2A2060, #3A308A);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(201,168,76,0.3);
    border: 1px solid rgba(201,168,76,0.3);
  }

  .modal-zodiac-info h2 {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, #FDEEA8, #C9A84C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal-zodiac-info .date-range {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  .modal-zodiac-info .tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
    font-style: italic;
  }

  .trait-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.7;
    color: rgba(255,255,255,0.75);
  }

  .trait-box .label {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
    font-weight: 700;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .course-card {
    background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, rgba(201,168,76,0.03) 100%);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
  }

  .course-num {
    display: inline-flex;
    width: 22px;
    height: 22px;
    background: var(--gold);
    color: #1A1745;
    font-size: 11px;
    font-weight: 800;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .course-name {
    font-size: 16px;
    font-weight: 700;
    color: #FDEEA8;
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  .fit-label {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    font-size: 13px;
    line-height: 1.7;
    color: rgba(255,255,255,0.72);
  }

  .fit-icon {
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .modal-close {
    margin-top: 24px;
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #C9A84C, #FDEEA8, #C9A84C);
    color: #1A1745;
    font-size: 15px;
    font-weight: 800;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    letter-spacing: 1px;
  }

  /* ====== 底部文案 ====== */
  .footer {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 20px 20px 50px;
  }

  .footer-tip {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    line-height: 1.8;
    max-width: 360px;
    margin: 0 auto 10px;
    text-align: center;
  }

  .footer-wish {
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .footer-school {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .footer-cta {
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
  }

  /* ====== 全部揭晓动画 ====== */
  .celebration {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    pointer-events: none;
  }

  .celebration.active {
    display: block;
  }

  /* 刮开提示动画 */
  .scratch-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: opacity 0.3s;
  }

  .scratch-hint-icon {
    font-size: 22px;
    animation: hand-swipe 1.5s ease infinite;
  }

  .scratch-hint-text {
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.4);
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  @keyframes hand-swipe {
    0% { transform: translateX(-6px); opacity: 0.6; }
    50% { transform: translateX(6px); opacity: 1; }
    100% { transform: translateX(-6px); opacity: 0.6; }
  }

  .card-wrapper.revealed .scratch-hint {
    opacity: 0;
  }

  /* 揭晓徽章 */
  .revealed-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: linear-gradient(135deg, #C9A84C, #FDEEA8);
    color: #1A1745;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 8px;
    opacity: 0;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .card-wrapper.revealed .revealed-badge {
    opacity: 1;
  }

  /* 滚动提示 */
  .scroll-hint {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 20px 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
  }
</style>

// ========= 全局状态 =========
let revealedCount = 0;
const revealedSet = new Set();

// ========= 星空背景 =========
(function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = document.body.scrollHeight || window.innerHeight;
  }

  function createStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.2,
        a: Math.random(),
        da: (Math.random() * 0.003 + 0.001) * (Math.random() > 0.5 ? 1 : -1)
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.da;
      if (s.a <= 0.1 || s.a >= 1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize();
  createStars();
  draw();
  window.addEventListener('resize', () => { resize(); createStars(); });
})();

// ========= 渲染星座卡片 =========
function renderGrid() {
  const grid = document.getElementById('zodiac-grid');
  ZODIAC_DATA.forEach((z, idx) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';
    wrapper.dataset.idx = idx;

    // 底层内容
    const reveal = document.createElement('div');
    reveal.className = 'card-reveal';
    reveal.innerHTML = `
      <div class="reveal-symbol">${z.emoji}</div>
      <div class="reveal-name">${z.name}</div>
      <div class="reveal-courses">
        <strong>📚 ${z.courses[0].name}</strong><br>
        <strong>📚 ${z.courses[1].name}</strong>
      </div>
    `;

    // 刮刮乐Canvas
    const canvas = document.createElement('canvas');
    canvas.className = 'scratch-canvas';
    canvas.dataset.idx = idx;

    // 提示层
    const hint = document.createElement('div');
    hint.className = 'scratch-hint';
    hint.innerHTML = `<div class="scratch-hint-icon">👆</div><div class="scratch-hint-text">滑动刮开</div>`;

    // 揭晓徽章
    const badge = document.createElement('div');
    badge.className = 'revealed-badge';
    badge.textContent = '✓ 已解锁';

    wrapper.appendChild(reveal);
    wrapper.appendChild(canvas);
    wrapper.appendChild(hint);
    wrapper.appendChild(badge);
    grid.appendChild(wrapper);

    // 初始化刮刮乐
    initScratch(canvas, z, wrapper);

    // 点击已揭晓的卡片显示详情
    reveal.addEventListener('click', () => {
      if (wrapper.classList.contains('revealed')) {
        showModal(idx);
      }
    });
  });
}

// ========= 刮刮乐逻辑 =========
function initScratch(canvas, zodiac, wrapper) {
  const ctx = canvas.getContext('2d');
  let isDrawing = false;
  let scratchProgress = 0;

  function resize() {
    const rect = wrapper.getBoundingClientRect();
    const size = rect.width || 120;
    canvas.width = size;
    canvas.height = size;
    drawCover();
  }

  function drawCover() {
    const w = canvas.width, h = canvas.height;
    // 渐变背景
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, zodiac.color);
    grad.addColorStop(0.5, shadeColor(zodiac.color, 30));
    grad.addColorStop(1, zodiac.color);
    ctx.fillStyle = grad;
    ctx.beginPath();
    roundRect(ctx, 0, 0, w, h, 16);
    ctx.fill();

    // 星座大符号
    ctx.globalCompositeOperation = 'source-over';
    ctx.font = `bold ${w * 0.42}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText(zodiac.symbol, w / 2, h / 2 - 8);

    // 星座名字
    ctx.font = `600 ${w * 0.11}px "PingFang SC", sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText(zodiac.name, w / 2, h * 0.75);

    // 日期
    ctx.font = `${w * 0.075}px "PingFang SC", sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(zodiac.dateRange, w / 2, h * 0.87);

    // 粒子点缀
    for (let i = 0; i < 12; i++) {
      ctx.beginPath();
      ctx.arc(
        Math.random() * w,
        Math.random() * h,
        Math.random() * 2 + 0.5,
        0, Math.PI * 2
      );
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fill();
    }
  }

  function scratch(x, y) {
    if (wrapper.classList.contains('revealed')) return;
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, canvas.width * 0.12, 0, Math.PI * 2);
    ctx.fill();
    checkProgress();
  }

  function checkProgress() {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let transparent = 0;
    for (let i = 3; i < imageData.data.length; i += 4) {
      if (imageData.data[i] < 128) transparent++;
    }
    const pct = transparent / (canvas.width * canvas.height);
    if (pct > 0.45) {
      revealCard(canvas, wrapper, zodiac);
    }
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - rect.left) * (canvas.width / rect.width),
        y: (e.touches[0].clientY - rect.top) * (canvas.height / rect.height)
      };
    }
    return {
      x: (e.clientX - rect.left) * (canvas.width / rect.width),
      y: (e.clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  canvas.addEventListener('mousedown', e => { isDrawing = true; const p = getPos(e); scratch(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if (!isDrawing) return; const p = getPos(e); scratch(p.x, p.y); });
  canvas.addEventListener('mouseup', () => isDrawing = false);
  canvas.addEventListener('mouseleave', () => isDrawing = false);

  canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; const p = getPos(e); scratch(p.x, p.y); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!isDrawing) return; const p = getPos(e); scratch(p.x, p.y); }, { passive: false });
  canvas.addEventListener('touchend', () => isDrawing = false);

  // 延迟初始化（确保布局完成）
  setTimeout(resize, 100);
  window.addEventListener('resize', resize);
}

function revealCard(canvas, wrapper, zodiac) {
  if (wrapper.classList.contains('revealed')) return;
  wrapper.classList.add('revealed');

  // 清除canvas
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 更新进度
  revealedCount++;
  const idx = parseInt(wrapper.dataset.idx);
  revealedSet.add(idx);
  updateProgress();

  // 粒子爆炸
  spawnParticles(wrapper);

  // 自动弹窗
  setTimeout(() => showModal(idx), 400);

  // 检查全部解锁
  if (revealedCount === 12) {
    setTimeout(triggerCelebration, 600);
  }
}

// ========= 进度更新 =========
function updateProgress() {
  document.getElementById('progress-text').textContent = `${revealedCount} / 12`;
  document.getElementById('progress-fill').style.width = `${(revealedCount / 12) * 100}%`;
}

// ========= 粒子效果 =========
function spawnParticles(wrapper) {
  const rect = wrapper.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.style.cssText = `
      position:fixed; left:${cx}px; top:${cy}px;
      width:6px; height:6px;
      background:${['#C9A84C','#FDEEA8','#fff','#FFD700'][i % 4]};
      border-radius:50%; pointer-events:none; z-index:999;
      transform:translate(-50%,-50%);
    `;
    document.body.appendChild(p);
    const angle = (i / 16) * Math.PI * 2;
    const dist = 60 + Math.random() * 40;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    p.animate([
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
    ], { duration: 700, easing: 'ease-out', fill: 'forwards' }).onfinish = () => p.remove();
  }
}

// ========= 庆祝动画 =========
function triggerCelebration() {
  const canvas = document.getElementById('celebration-canvas');
  canvas.classList.add('active');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const particles = [];
  const colors = ['#C9A84C','#FDEEA8','#fff','#FFD700','#E63946','#457B9D','#6BAD8A'];

  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -20,
      r: Math.random() * 5 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 3 + 2,
      alpha: 1
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.alpha -= 0.008;
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    frame++;
    if (frame < 200) requestAnimationFrame(draw);
    else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.classList.remove('active');
    }
  }
  draw();
}

// ========= 弹窗 =========
function showModal(idx) {
  const z = ZODIAC_DATA[idx];
  const content = `
    <div class="modal-zodiac-header">
      <div class="modal-symbol-big">${z.emoji}</div>
      <div class="modal-zodiac-info">
        <h2>${z.name} ${z.symbol}</h2>
        <div class="date-range">📅 ${z.dateRange}</div>
        <div class="tagline">${z.tagline}</div>
      </div>
    </div>
    <div class="trait-box">
      <div class="label">✦ 星座特质</div>
      ${z.trait}
    </div>
    ${z.courses.map((c, i) => `
      <div class="course-card">
        <div class="course-name">
          <span class="course-num">${i + 1}</span>
          《${c.name}》
        </div>
        <div class="fit-label">
          <span class="fit-icon">🔮</span>
          <span>${c.fit}</span>
        </div>
      </div>
    `).join('')}
  `;
  document.getElementById('modal-content').innerHTML = content;
  document.getElementById('modal-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ========= 工具函数 =========
function shadeColor(hex, percent) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, (num >> 16) + percent);
  const g = Math.min(255, ((num >> 8) & 0xFF) + percent);
  const b = Math.min(255, (num & 0xFF) + percent);
  return `rgb(${r},${g},${b})`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
